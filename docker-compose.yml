version: "3.8"

services:
  web:
    build: .                      # Construye desde el Dockerfile
    container_name: elrincondellibro_web
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html       # Código fuente
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: elrincondellibro_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: elrincondellibro
      MYSQL_USER: user
      MYSQL_PASSWORD: pass123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./src/BD:/docker-entrypoint-initdb.d

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: elrincondellibro_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: user
      PMA_PASSWORD: pass123
    depends_on:
      - db

volumes:
  db_data:
